name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify release versions
        run: node scripts/release/verify-version.mjs "${GITHUB_REF_NAME}"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Test release tooling and JavaScript packages
        run: |
          cargo fmt --all --check
          cargo test -p vesty-cli
          cargo clippy -p vesty-cli --all-targets -- -D warnings
          npm test

      - name: Generate registry release evidence
        run: |
          mkdir -p target/release-evidence/{publish-plan,crate-package,npm-pack}
          cargo run -p vesty-cli -- publish-plan \
            --out target/release-evidence/publish-plan/publish-plan.json
          cargo run -p vesty-cli -- publish-plan \
            --check \
            --out target/release-evidence/publish-plan/publish-plan.json
          cargo run -p vesty-cli -- crate-package \
            --out target/release-evidence/crate-package/crate-package.json
          cargo run -p vesty-cli -- crate-package \
            --check \
            --out target/release-evidence/crate-package/crate-package.json
          cargo run -p vesty-cli -- npm-pack \
            --out target/release-evidence/npm-pack/npm-pack.json
          cargo run -p vesty-cli -- npm-pack \
            --check \
            --out target/release-evidence/npm-pack/npm-pack.json

      - uses: actions/upload-artifact@v7
        with:
          name: registry-release-evidence
          path: target/release-evidence
          if-no-files-found: error

  build-cli:
    name: build CLI (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            rust_targets: x86_64-unknown-linux-musl
            asset: vesty-x86_64-unknown-linux-musl
          - platform: macos-universal
            os: macos-latest
            target: universal-apple-darwin
            rust_targets: x86_64-apple-darwin aarch64-apple-darwin
            asset: vesty-universal-apple-darwin
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            asset: vesty-x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install musl linker
        if: matrix.platform == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust targets
        shell: bash
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Build CLI
        if: matrix.platform != 'macos-universal'
        shell: bash
        run: cargo build --locked --release -p vesty-cli --target "${{ matrix.target }}"

      - name: Build universal macOS CLI
        if: matrix.platform == 'macos-universal'
        shell: bash
        run: |
          cargo build --locked --release -p vesty-cli --target x86_64-apple-darwin
          cargo build --locked --release -p vesty-cli --target aarch64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/vesty \
            target/aarch64-apple-darwin/release/vesty \
            -output target/universal-apple-darwin/release/vesty

      - name: Package Unix CLI
        if: runner.os != 'Windows'
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p "dist/${ASSET_NAME}"
          cp "target/${TARGET}/release/vesty" "dist/${ASSET_NAME}/vesty"
          cp LICENSE-APACHE README.md "dist/${ASSET_NAME}/"
          "dist/${ASSET_NAME}/vesty" --version
          tar -C dist -czf "dist/${ASSET_NAME}.tar.gz" "${ASSET_NAME}"

      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET_NAME: ${{ matrix.asset }}
          TARGET: ${{ matrix.target }}
        run: |
          $stage = "dist/$env:ASSET_NAME"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/$env:TARGET/release/vesty.exe" "$stage/vesty.exe"
          Copy-Item LICENSE-APACHE, README.md $stage
          & "$stage/vesty.exe" --version
          Compress-Archive -Path $stage -DestinationPath "dist/$env:ASSET_NAME.zip"

      - uses: actions/upload-artifact@v7
        if: runner.os != 'Windows'
        with:
          name: cli-${{ matrix.platform }}
          path: dist/*.tar.gz
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Windows'
        with:
          name: cli-${{ matrix.platform }}
          path: dist/*.zip
          if-no-files-found: error

  publish-crates:
    name: publish crates.io packages
    needs: [validate, build-cli]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux package verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Generate publish plan
        run: cargo run -p vesty-cli -- publish-plan --out target/publish-plan.json

      - name: Authenticate with crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
          VESTY_RELEASE_VERSION: ${{ github.ref_name }}
        run: bash scripts/release/publish-crates.sh target/publish-plan.json

  publish-npm:
    name: publish npm packages
    needs: [validate, build-cli]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install and build packages
        run: |
          npm ci
          npm run build

      - name: Publish npm packages
        env:
          VESTY_RELEASE_VERSION: ${{ github.ref_name }}
        run: bash scripts/release/publish-npm.sh

  smoke-cli:
    name: smoke released CLI (${{ matrix.platform }})
    needs: [build-cli, publish-crates, publish-npm]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            asset: vesty-x86_64-unknown-linux-musl
            archive: vesty-x86_64-unknown-linux-musl.tar.gz
          - platform: macos-universal
            os: macos-latest
            asset: vesty-universal-apple-darwin
            archive: vesty-universal-apple-darwin.tar.gz
          - platform: windows-x64
            os: windows-latest
            asset: vesty-x86_64-pc-windows-msvc
            archive: vesty-x86_64-pc-windows-msvc.zip

    steps:
      - name: Install Linux plugin build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v7
        with:
          name: cli-${{ matrix.platform }}
          path: artifact

      - name: Smoke Unix CLI and generated Rust project
        if: runner.os != 'Windows'
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          tar -xzf "artifact/${ARCHIVE}" -C "${RUNNER_TEMP}"
          cli="${RUNNER_TEMP}/${ASSET_NAME}/vesty"
          project="${RUNNER_TEMP}/vesty-release-smoke"
          "${cli}" --version
          "${cli}" templates
          "${cli}" new "${project}" --template gain
          cargo check --manifest-path "${project}/Cargo.toml"

      - name: Smoke Windows CLI and generated Rust project
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET_NAME: ${{ matrix.asset }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          Expand-Archive "artifact/$env:ARCHIVE" -DestinationPath $env:RUNNER_TEMP
          $cli = Join-Path $env:RUNNER_TEMP "$env:ASSET_NAME/vesty.exe"
          $project = Join-Path $env:RUNNER_TEMP "vesty-release-smoke"
          & $cli --version
          & $cli templates
          & $cli new $project --template gain
          cargo check --manifest-path "$project/Cargo.toml"

  smoke-web-template:
    name: smoke released Web UI template
    needs: [build-cli, publish-crates, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Install Linux plugin build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v7
        with:
          name: cli-linux-x64
          path: artifact

      - name: Build a generated React editor project
        run: |
          tar -xzf artifact/vesty-x86_64-unknown-linux-musl.tar.gz -C "${RUNNER_TEMP}"
          cli="${RUNNER_TEMP}/vesty-x86_64-unknown-linux-musl/vesty"
          project="${RUNNER_TEMP}/vesty-web-release-smoke"
          "${cli}" new "${project}" --template web-ui-param-demo
          cargo check --manifest-path "${project}/Cargo.toml"
          npm install --prefix "${project}/ui"
          npm run build --prefix "${project}/ui"
          npm run typecheck --prefix "${project}/ui"

  github-release:
    name: publish GitHub Release
    needs: [smoke-cli, smoke-web-template]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: cli-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum *.tar.gz *.zip > SHA256SUMS

      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: release-assets/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          args=(--verify-tag --generate-notes --title "Vesty ${GITHUB_REF_NAME}")
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            args+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* "${args[@]}"
          fi
